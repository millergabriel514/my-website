<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        h1 {
            margin-bottom: 20px;
        }
        canvas {
            border: 2px solid #38bdf8;
            background: #0f172a;
        }
        .controls {
            margin-top: 20px;
            text-align: center;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 0 10px;
        }
        button:hover {
            background: #0ea5e9;
        }
        #score {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(15, 23, 42, 0.9);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #38bdf8;
        }
        .game-over h2 {
            margin: 0 0 10px 0;
            color: #ef4444;
        }
        .game-over p {
            margin: 0 0 20px 0;
        }
    </style>
</head>
<body>
    <h1>Gabe's Snake Game</h1>
    <div id="score">Score: 0</div>
    <div style="position: relative; display: inline-block;">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="gameOver" class="game-over" style="display: none;">
            <h2>Game Over!</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button id="tryAgainBtn">Try Again</button>
        </div>
    </div>
    <div class="controls">
        <button id="startBtn">Start Game</button>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const startBtn = document.getElementById('startBtn');
        const gameOverDiv = document.getElementById('gameOver');
        const finalScoreElement = document.getElementById('finalScore');
        const tryAgainBtn = document.getElementById('tryAgainBtn');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [
            {x: 10, y: 10},
            {x: 9, y: 10},
            {x: 8, y: 10}
        ];
        let food = {};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let gameRunning = false;

        function randomTile() {
            return Math.floor(Math.random() * tileCount);
        }

        function generateFood() {
            food = {
                x: randomTile(),
                y: randomTile()
            };
        }

        function drawGame() {
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw snake
            if (snake.length > 0) {
                if (snake.length === 1) {
                    let head = snake[0];
                    ctx.fillStyle = '#38bdf8';
                    ctx.beginPath();
                    ctx.arc(head.x * gridSize + gridSize / 2, head.y * gridSize + gridSize / 2, gridSize / 2, 0, 2 * Math.PI);
                    ctx.fill();
                } else {
                    ctx.strokeStyle = '#38bdf8';
                    ctx.lineWidth = gridSize;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.beginPath();
                    ctx.moveTo(snake[0].x * gridSize + gridSize / 2, snake[0].y * gridSize + gridSize / 2);
                    for (let i = 1; i < snake.length; i++) {
                        ctx.lineTo(snake[i].x * gridSize + gridSize / 2, snake[i].y * gridSize + gridSize / 2);
                    }
                    ctx.stroke();
                }
            }
            // Draw eyes on head
            if (snake.length > 0) {
                let head = snake[0];
                // Left eye white
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(head.x * gridSize + gridSize / 2 - 3, head.y * gridSize + gridSize / 2 - 3, 3, 0, 2 * Math.PI);
                ctx.fill();
                // Left pupil black
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(head.x * gridSize + gridSize / 2 - 3, head.y * gridSize + gridSize / 2 - 3, 1.5, 0, 2 * Math.PI);
                ctx.fill();
                // Right eye white
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(head.x * gridSize + gridSize / 2 + 3, head.y * gridSize + gridSize / 2 - 3, 3, 0, 2 * Math.PI);
                ctx.fill();
                // Right pupil black
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(head.x * gridSize + gridSize / 2 + 3, head.y * gridSize + gridSize / 2 - 3, 1.5, 0, 2 * Math.PI);
                ctx.fill();
            }

            // Draw food (apple)
            ctx.fillStyle = '#ef4444';
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize / 2, food.y * gridSize + gridSize / 2, gridSize / 2, 0, 2 * Math.PI);
            ctx.fill();
            // Stem
            ctx.fillStyle = '#22c55e';
            ctx.fillRect(food.x * gridSize + gridSize / 2 - 1.5, food.y * gridSize + 1, 3, 6);
        }

        function moveSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 1;
                scoreElement.textContent = `Score: ${score}`;
                generateFood();
            } else {
                snake.pop();
            }
        }

        function checkCollision() {
            const head = snake[0];
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                return true;
            }
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return true;
                }
            }
            return false;
        }

        function gameLoop() {
            if (!gameRunning) return;

            moveSnake();
            if (checkCollision()) {
                gameRunning = false;
                finalScoreElement.textContent = score;
                gameOverDiv.style.display = 'block';
                return;
            }
            drawGame();
        }

        function startGame() {
            snake = [
                {x: 10, y: 10},
                {x: 9, y: 10},
                {x: 8, y: 10}
            ];
            dx = 1;
            dy = 0;
            score = 0;
            scoreElement.textContent = 'Score: 0';
            generateFood();
            gameRunning = true;
            startBtn.style.display = 'none';
            gameOverDiv.style.display = 'none';
            drawGame();
        }

        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            const key = e.key;
            if (key === 'ArrowLeft' && dx === 0) {
                dx = -1;
                dy = 0;
            } else if (key === 'ArrowUp' && dy === 0) {
                dx = 0;
                dy = -1;
            } else if (key === 'ArrowRight' && dx === 0) {
                dx = 1;
                dy = 0;
            } else if (key === 'ArrowDown' && dy === 0) {
                dx = 0;
                dy = 1;
            }
        });

        startBtn.addEventListener('click', startGame);
        tryAgainBtn.addEventListener('click', startGame);

        setInterval(gameLoop, 100);
    </script>
</body>
</html>
